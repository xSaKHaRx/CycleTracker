<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#151220">
<title>Цикл</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #151220;
    --surface: #1E1A2B;
    --surface-2: #241f35;
    --border: #2E2740;
    --text: #F2EDF7;
    --text-muted: #9089A3;
    --rose: #D66B92;
    --rose-dim: #6d3f4e;
    --lavender: #8C7FBE;
    --sage: #7FA69C;
    --deep: #372F4D;
    --danger: #c96a6a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Inter',system-ui,sans-serif; overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;}
  body{min-height:100vh; padding-bottom:40px;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  .container{max-width:480px;margin:0 auto;padding:24px 20px 0;}

  /* header */
  .eyebrow{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin:0 0 4px;font-weight:500;}
  .app-title{font-size:22px;font-weight:600;margin:0 0 20px;}

  /* ring */
  .ring-wrap{position:relative;width:240px;height:240px;margin:8px auto 18px;}
  .ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .ring-day-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
  .ring-day-num{font-family:'Fraunces',serif;font-size:56px;font-weight:500;line-height:1;margin:2px 0;}
  .ring-phase{font-size:14px;color:var(--text-muted);}

  .predict-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px 18px;margin-bottom:16px;}
  .predict-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;}
  .predict-row + .predict-row{border-top:1px solid var(--border);}
  .predict-label{font-size:14px;color:var(--text-muted);}
  .predict-value{font-size:15px;font-weight:600;}
  .predict-value.rose{color:var(--rose);}
  .predict-value.sage{color:var(--sage);}

  /* calendar */
  .cal-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px 16px 8px;margin-bottom:16px;}
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-header button{background:none;border:none;color:var(--text);font-size:20px;padding:6px 10px;cursor:pointer;border-radius:8px;}
  .cal-header button:active{background:var(--surface-2);}
  .cal-month{font-size:16px;font-weight:600;font-family:'Fraunces',serif;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{text-align:center;font-size:11px;color:var(--text-muted);padding-bottom:6px;text-transform:uppercase;}
  .cal-day{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:14px;cursor:pointer;color:var(--text);}
  .cal-day.empty{cursor:default;}
  .cal-day.today{box-shadow:inset 0 0 0 1.5px var(--text-muted);}
  .cal-day.flow-light{background:rgba(214,107,146,.35);}
  .cal-day.flow-medium{background:rgba(214,107,146,.65);}
  .cal-day.flow-heavy{background:var(--rose);color:#1a0e14;font-weight:600;}
  .cal-day.predicted{box-shadow:inset 0 0 0 1.5px var(--rose-dim); color:var(--rose);}
  .cal-day.fertile::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--sage);}

  /* log section */
  .log-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px 18px;margin-bottom:16px;}
  .log-title{font-size:14px;color:var(--text-muted);margin-bottom:10px;}
  .log-date{font-size:15px;font-weight:600;margin-bottom:12px;}
  .flow-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .flow-btn{padding:10px 4px;border-radius:12px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:13px;font-family:'Inter';cursor:pointer;text-align:center;}
  .flow-btn.active-none{background:var(--surface-2);border-color:var(--text-muted);}
  .flow-btn.active-light{background:rgba(214,107,146,.35);border-color:var(--rose);}
  .flow-btn.active-medium{background:rgba(214,107,146,.65);border-color:var(--rose);}
  .flow-btn.active-heavy{background:var(--rose);border-color:var(--rose);color:#1a0e14;font-weight:600;}

  /* stats */
  .stats-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px 18px;margin-bottom:16px;}
  .stats-title{font-size:14px;color:var(--text-muted);margin-bottom:10px;}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .stat-box{background:var(--surface-2);border-radius:12px;padding:12px;}
  .stat-num{font-family:'Fraunces',serif;font-size:26px;font-weight:500;}
  .stat-lbl{font-size:12px;color:var(--text-muted);margin-top:2px;}
  .stat-note{font-size:12px;color:var(--text-muted);margin-top:10px;line-height:1.5;}

  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-muted);padding:0 4px 8px;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .footer-note{text-align:center;font-size:12px;color:var(--text-muted);padding:8px 20px 0;line-height:1.6;}
</style>
</head>
<body>
<div class="container">
  <p class="eyebrow" id="todayDate">—</p>
  <h1 class="app-title">Твой цикл</h1>

  <div class="ring-wrap">
    <svg viewBox="0 0 200 200" id="ringSvg"></svg>
    <div class="ring-center">
      <div class="ring-day-label">День цикла</div>
      <div class="ring-day-num" id="cycleDayNum">—</div>
      <div class="ring-phase" id="phaseLabel">—</div>
    </div>
  </div>

  <div class="predict-card">
    <div class="predict-row">
      <span class="predict-label">Следующие месячные</span>
      <span class="predict-value rose" id="nextPeriod">—</span>
    </div>
    <div class="predict-row">
      <span class="predict-label">Примерное фертильное окно</span>
      <span class="predict-value sage" id="fertileWindow">—</span>
    </div>
  </div>

  <div class="cal-card">
    <div class="cal-header">
      <button id="prevMonth" aria-label="Предыдущий месяц">‹</button>
      <div class="cal-month" id="calMonthLabel">—</div>
      <button id="nextMonth" aria-label="Следующий месяц">›</button>
    </div>
    <div class="cal-grid" id="calDow"></div>
    <div class="cal-grid" id="calGrid" style="margin-top:2px;"></div>
    <div class="legend" style="margin-top:12px;">
      <span><i style="background:var(--rose)"></i>Месячные</span>
      <span><i style="background:var(--sage)"></i>Фертильное окно</span>
      <span><i style="background:transparent;box-shadow:inset 0 0 0 1.5px var(--rose-dim)"></i>Прогноз</span>
    </div>
  </div>

  <div class="log-card">
    <div class="log-title">Отметить день</div>
    <div class="log-date" id="selectedDateLabel">—</div>
    <div class="flow-buttons" id="flowButtons">
      <button class="flow-btn" data-flow="none">Нет</button>
      <button class="flow-btn" data-flow="light">Слабо</button>
      <button class="flow-btn" data-flow="medium">Средне</button>
      <button class="flow-btn" data-flow="heavy">Сильно</button>
    </div>
  </div>

  <div class="stats-card">
    <div class="stats-title">Статистика</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-num" id="avgCycleLen">—</div>
        <div class="stat-lbl">Средний цикл, дней</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="avgPeriodLen">—</div>
        <div class="stat-lbl">Длительность месячных</div>
      </div>
    </div>
    <div class="stat-note" id="statsNote"></div>
  </div>

  <p class="footer-note">Все данные хранятся только на этом устройстве, в этом браузере. Никуда не отправляются.</p>
</div>

<script>
(function(){
  "use strict";

  // ---------- storage layer (falls back to memory if localStorage unavailable) ----------
  var memStore = {};
  var hasLS = true;
  try {
    var t = "__t__"; localStorage.setItem(t,"1"); localStorage.removeItem(t);
  } catch(e){ hasLS = false; }

  function storageGet(key){
    if(hasLS){ return localStorage.getItem(key); }
    return memStore[key] !== undefined ? memStore[key] : null;
  }
  function storageSet(key, val){
    if(hasLS){ localStorage.setItem(key, val); }
    else { memStore[key] = val; }
  }

  var DATA_KEY = "cycleTrackerData_v1";
  function loadData(){
    var raw = storageGet(DATA_KEY);
    if(!raw) return { entries: {} };
    try { return JSON.parse(raw); } catch(e){ return { entries: {} }; }
  }
  function saveData(data){
    storageSet(DATA_KEY, JSON.stringify(data));
  }
  var data = loadData();

  // ---------- date helpers (all in local time, keyed as YYYY-MM-DD) ----------
  function fmtKey(d){
    var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
    return y+"-"+m+"-"+day;
  }
  function addDays(d, n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
  function daysBetween(a,b){ return Math.round((b - a)/(1000*60*60*24)); }
  function startOfDay(d){ var r=new Date(d); r.setHours(0,0,0,0); return r; }

  var MONTHS = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
  var DOW = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

  function fmtLong(d){
    return d.getDate()+" "+MONTHS[d.getMonth()].toLowerCase()+" "+d.getFullYear();
  }
  function fmtShort(d){
    return d.getDate()+" "+MONTHS[d.getMonth()].toLowerCase();
  }

  // ---------- derive period instances from logged entries ----------
  // returns array of {start: Date, end: Date, length: n} sorted ascending
  function getPeriods(){
    var days = Object.keys(data.entries).filter(function(k){ return data.entries[k] && data.entries[k] !== "none"; }).sort();
    var periods = [];
    var current = null;
    var prevDate = null;
    days.forEach(function(k){
      var d = new Date(k+"T00:00:00");
      if(current && prevDate && daysBetween(prevDate, d) === 1){
        current.end = d;
        current.length += 1;
      } else {
        if(current) periods.push(current);
        current = { start: d, end: d, length: 1 };
      }
      prevDate = d;
    });
    if(current) periods.push(current);
    return periods;
  }

  function average(arr){
    if(!arr.length) return null;
    return arr.reduce(function(a,b){return a+b;},0) / arr.length;
  }

  function getStats(){
    var periods = getPeriods();
    var cycleLengths = [];
    for(var i=1;i<periods.length;i++){
      cycleLengths.push(daysBetween(periods[i-1].start, periods[i].start));
    }
    // use up to last 6 cycles for a responsive-but-stable average
    var recentCycles = cycleLengths.slice(-6);
    var avgCycle = average(recentCycles) || 28;
    var periodLengths = periods.map(function(p){ return p.length; });
    var recentPeriodLens = periodLengths.slice(-6);
    var avgPeriod = average(recentPeriodLens) || 5;

    return {
      periods: periods,
      avgCycle: Math.round(avgCycle*10)/10,
      avgPeriod: Math.round(avgPeriod*10)/10,
      hasEnoughForCycle: cycleLengths.length >= 1,
      hasAnyPeriod: periods.length >= 1,
      cycleCount: cycleLengths.length
    };
  }

  function getPredictions(){
    var stats = getStats();
    if(!stats.hasAnyPeriod){
      return { stats: stats, nextStart: null, ovulation: null, fertileStart: null, fertileEnd: null, lastStart: null };
    }
    var lastStart = stats.periods[stats.periods.length-1].start;
    var cycleLen = stats.avgCycle;
    var nextStart = addDays(lastStart, Math.round(cycleLen));
    // if next predicted start is already in the past (user hasn't logged this cycle's period yet),
    // keep projecting forward so the prediction stays useful
    var today = startOfDay(new Date());
    while(daysBetween(today, nextStart) < 0){
      nextStart = addDays(nextStart, Math.round(cycleLen));
    }
    var ovulation = addDays(nextStart, -14);
    var fertileStart = addDays(ovulation, -5);
    var fertileEnd = addDays(ovulation, 1);
    return { stats: stats, nextStart: nextStart, ovulation: ovulation, fertileStart: fertileStart, fertileEnd: fertileEnd, lastStart: lastStart };
  }

  // ---------- ring rendering ----------
  var phaseColors = {
    menstrual: "#D66B92",
    follicular: "#8C7FBE",
    fertile: "#7FA69C",
    luteal: "#372F4D"
  };

  function polar(cx,cy,r,angleDeg){
    var a = (angleDeg) * Math.PI/180;
    return [cx + r*Math.cos(a), cy + r*Math.sin(a)];
  }
  function arcPath(cx,cy,r,startDeg,endDeg){
    if(endDeg - startDeg >= 359.999) endDeg = startDeg + 359.999;
    var s = polar(cx,cy,r,startDeg);
    var e = polar(cx,cy,r,endDeg);
    var largeArc = (endDeg-startDeg) > 180 ? 1 : 0;
    return "M "+cx+" "+cy+" L "+s[0]+" "+s[1]+" A "+r+" "+r+" 0 "+largeArc+" 1 "+e[0]+" "+e[1]+" Z";
  }

  function renderRing(pred){
    var svg = document.getElementById("ringSvg");
    var cx=100, cy=100, r=92;
    var cycleLen = pred.stats.avgCycle || 28;
    var periodLen = pred.stats.avgPeriod || 5;

    var segments = [];
    if(pred.nextStart){
      var ovulationDayIdx = cycleLen - 14; // day index (0-based) of ovulation within cycle
      var fertileStartIdx = ovulationDayIdx - 5;
      var fertileEndIdx = ovulationDayIdx + 1;

      segments.push({from:0, to:periodLen, color:phaseColors.menstrual});
      segments.push({from:periodLen, to:Math.max(periodLen,fertileStartIdx), color:phaseColors.follicular});
      segments.push({from:Math.max(periodLen,fertileStartIdx), to:fertileEndIdx, color:phaseColors.fertile});
      segments.push({from:fertileEndIdx, to:cycleLen, color:phaseColors.luteal});
    } else {
      segments.push({from:0, to:cycleLen, color:"#2E2740"});
    }

    var svgContent = "";
    segments.forEach(function(seg){
      if(seg.to <= seg.from) return;
      var startDeg = (seg.from/cycleLen)*360;
      var endDeg = (seg.to/cycleLen)*360;
      svgContent += '<path d="'+arcPath(cx,cy,r,startDeg,endDeg)+'" fill="'+seg.color+'" />';
    });
    // inner hole to make it a ring
    svgContent += '<circle cx="'+cx+'" cy="'+cy+'" r="66" fill="#151220" />';

    // today marker
    if(pred.nextStart){
      var today = startOfDay(new Date());
      var cycleDay = ((cycleLen - daysBetween(today, pred.nextStart)) % cycleLen + cycleLen) % cycleLen;
      var markerDeg = (cycleDay/cycleLen)*360;
      var mp = polar(cx,cy,79,markerDeg);
      svgContent += '<circle cx="'+mp[0]+'" cy="'+mp[1]+'" r="6" fill="#F2EDF7" stroke="#151220" stroke-width="2" />';
    }

    svg.innerHTML = svgContent;
  }

  function renderCenterInfo(pred){
    var today = startOfDay(new Date());
    var dayNumEl = document.getElementById("cycleDayNum");
    var phaseEl = document.getElementById("phaseLabel");

    if(!pred.nextStart){
      dayNumEl.textContent = "—";
      phaseEl.textContent = "Отметь первый день, чтобы начать";
      return;
    }
    var cycleLen = pred.stats.avgCycle;
    var cycleDay = Math.round(((cycleLen - daysBetween(today, pred.nextStart)) % cycleLen + cycleLen) % cycleLen) + 1;
    dayNumEl.textContent = cycleDay;

    var periodLen = pred.stats.avgPeriod;
    var ovulationIdx = cycleLen - 14;
    var fertileStartIdx = ovulationIdx - 5;
    var fertileEndIdx = ovulationIdx + 1;
    var phase;
    if(cycleDay <= periodLen) phase = "Менструация";
    else if(cycleDay <= fertileStartIdx) phase = "Фолликулярная фаза";
    else if(cycleDay <= fertileEndIdx) phase = "Фертильное окно";
    else phase = "Лютеиновая фаза";
    phaseEl.textContent = phase;
  }

  function renderPredictionCard(pred){
    var nextEl = document.getElementById("nextPeriod");
    var fertEl = document.getElementById("fertileWindow");
    if(!pred.nextStart){
      nextEl.textContent = "нет данных";
      fertEl.textContent = "нет данных";
      return;
    }
    var today = startOfDay(new Date());
    var daysUntil = daysBetween(today, pred.nextStart);
    var untilLabel = daysUntil === 0 ? "сегодня" : daysUntil === 1 ? "завтра" : "через "+daysUntil+" дн.";
    nextEl.textContent = untilLabel+" · "+fmtShort(pred.nextStart);
    fertEl.textContent = fmtShort(pred.fertileStart)+" – "+fmtShort(pred.fertileEnd);
  }

  function renderStats(pred){
    document.getElementById("avgCycleLen").textContent = pred.stats.hasEnoughForCycle ? pred.stats.avgCycle : "28*";
    document.getElementById("avgPeriodLen").textContent = pred.stats.hasAnyPeriod ? pred.stats.avgPeriod : "5*";
    var note = document.getElementById("statsNote");
    if(!pred.stats.hasEnoughForCycle){
      note.textContent = "* Пока используются средние значения по умолчанию. Точность прогноза вырастет после 2-3 отмеченных циклов.";
    } else {
      note.textContent = "Рассчитано по последним "+Math.min(pred.stats.cycleCount,6)+" циклам.";
    }
  }

  // ---------- calendar ----------
  var viewDate = startOfDay(new Date());
  viewDate.setDate(1);
  var selectedDate = startOfDay(new Date());

  function buildDowRow(){
    var el = document.getElementById("calDow");
    el.innerHTML = DOW.map(function(d){ return '<div class="cal-dow">'+d+'</div>'; }).join("");
  }

  function renderCalendar(pred){
    var grid = document.getElementById("calGrid");
    var label = document.getElementById("calMonthLabel");
    label.textContent = MONTHS[viewDate.getMonth()]+" "+viewDate.getFullYear();

    var firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
    var startOffset = (firstDay.getDay()+6) % 7; // make Monday=0
    var daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();

    var today = startOfDay(new Date());
    var html = "";
    for(var i=0;i<startOffset;i++){ html += '<div class="cal-day empty"></div>'; }

    for(var day=1; day<=daysInMonth; day++){
      var d = new Date(viewDate.getFullYear(), viewDate.getMonth(), day);
      var key = fmtKey(d);
      var classes = ["cal-day"];
      var flow = data.entries[key];
      if(flow && flow !== "none") classes.push("flow-"+flow);
      if(daysBetween(today,d) === 0) classes.push("today");

      // predicted period day?
      if(pred.nextStart){
        var pLen = Math.round(pred.stats.avgPeriod);
        for(var pd=0; pd<pLen; pd++){
          if(fmtKey(addDays(pred.nextStart,pd)) === key && (!flow || flow==="none")){
            classes.push("predicted");
          }
        }
        if(pred.fertileStart && d >= pred.fertileStart && d <= pred.fertileEnd){
          classes.push("fertile");
        }
      }
      html += '<div class="'+classes.join(" ")+'" data-key="'+key+'">'+day+'</div>';
    }
    grid.innerHTML = html;

    Array.prototype.forEach.call(grid.querySelectorAll(".cal-day:not(.empty)"), function(el){
      el.addEventListener("click", function(){
        selectedDate = new Date(el.getAttribute("data-key")+"T00:00:00");
        refreshAll();
      });
    });
  }

  // ---------- log section ----------
  function renderLogSection(){
    document.getElementById("selectedDateLabel").textContent = fmtLong(selectedDate);
    var key = fmtKey(selectedDate);
    var current = data.entries[key] || "none";
    var buttons = document.querySelectorAll(".flow-btn");
    buttons.forEach(function(btn){
      var f = btn.getAttribute("data-flow");
      btn.classList.remove("active-none","active-light","active-medium","active-heavy");
      if(f === current) btn.classList.add("active-"+f);
    });
  }

  document.getElementById("flowButtons").addEventListener("click", function(e){
    var btn = e.target.closest(".flow-btn");
    if(!btn) return;
    var flow = btn.getAttribute("data-flow");
    var key = fmtKey(selectedDate);
    if(flow === "none"){ delete data.entries[key]; }
    else { data.entries[key] = flow; }
    saveData(data);
    refreshAll();
  });

  document.getElementById("prevMonth").addEventListener("click", function(){
    viewDate.setMonth(viewDate.getMonth()-1);
    refreshAll();
  });
  document.getElementById("nextMonth").addEventListener("click", function(){
    viewDate.setMonth(viewDate.getMonth()+1);
    refreshAll();
  });

  function refreshAll(){
    var pred = getPredictions();
    renderRing(pred);
    renderCenterInfo(pred);
    renderPredictionCard(pred);
    renderStats(pred);
    renderCalendar(pred);
    renderLogSection();
  }

  document.getElementById("todayDate").textContent = fmtLong(new Date());
  buildDowRow();
  refreshAll();

  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }
})();
</script>
</body>
</html>
